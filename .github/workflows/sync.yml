name: sync-plugins

# Автообновление встроенных копий скиллов из их репозиториев:
# по расписанию (каждые 6 часов) и вручную кнопкой Run workflow.
on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync vendored plugins from skill repos
        run: python scripts/sync_plugins.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Sync vendored plugins from skill repos"
            git push
          else
            echo "already up to date"
          fi
