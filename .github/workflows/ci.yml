name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Marketplace manifest is valid JSON
        run: |
          python - <<'PY'
          import json
          m = json.load(open(".claude-plugin/marketplace.json", encoding="utf-8"))
          assert m["name"] == "damascus-ink", m["name"]
          names = [p["name"] for p in m["plugins"]]
          assert names == sorted(set(names)) or len(names) == len(set(names)), "duplicate plugin names"
          for p in m["plugins"]:
              assert isinstance(p["source"], str) and p["source"] == "./plugins/" + p["name"], p
              pj = json.load(open(p["source"].lstrip("./") + "/.claude-plugin/plugin.json", encoding="utf-8"))
              assert pj["name"] == p["name"], (pj["name"], p["name"])
              print("ok:", p["name"], "->", p["source"])
          print("marketplace.json OK:", len(m["plugins"]), "plugins")
          PY
